<!DOCTYPE html>
<!-- Paso 2 del flujo de venta: agregar lineas de detalle.
     Cada linea descuenta stock del producto (ver VentaController). -->
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fercementos | Detalle de venta</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

    <header th:replace="~{fragmentos :: cabeceraApp}"></header>

    <main class="contenedor">

        <div class="barra-acciones">
            <h2 class="titulo-formulario"
                th:text="'Venta #' + ${venta.idVenta} + ' — ' + (${venta.cliente?.nombre} ?: 'Sin cliente')"></h2>
            <a class="boton boton-secundario" th:href="@{/ventas}">Volver al listado</a>
        </div>

        <p class="mensaje-error" th:if="${error}" th:text="${error}"></p>

        <p class="mensaje-vacio" th:if="${#lists.isEmpty(venta.detalles)}">
            Esta venta aún no tiene productos. Agrega el primero abajo.</p>

        <table class="tabla" th:unless="${#lists.isEmpty(venta.detalles)}">
            <thead>
                <tr><th>Producto</th><th>Cantidad</th><th>Precio unitario</th><th>Subtotal</th></tr>
            </thead>
            <tbody>
                <tr th:each="d : ${venta.detalles}">
                    <td th:text="${d.producto?.nombre}"></td>
                    <td th:text="${d.cantidad}"></td>
                    <td th:text="${#numbers.formatDecimal(d.precio, 1, 'POINT', 2, 'COMMA')}"></td>
                    <td th:text="${#numbers.formatDecimal(d.subtotal, 1, 'POINT', 2, 'COMMA')}"></td>
                </tr>
            </tbody>
        </table>

        <p class="total-venta" th:unless="${#lists.isEmpty(venta.detalles)}"
           th:text="'TOTAL: $ ' + ${#numbers.formatDecimal(venta.total, 1, 'POINT', 2, 'COMMA')}"></p>

        <!-- Formulario para agregar una linea: POST /ventas/detalle/{id}/agregar -->
        <form class="fila-agregar" th:action="@{/ventas/detalle/{id}/agregar(id=${venta.idVenta})}" method="post">
            <div class="campo">
                <label for="idProducto">Producto</label>
                <select id="idProducto" name="idProducto" required>
                    <option value="">-- Selecciona --</option>
                    <option th:each="p : ${productos}"
                            th:value="${p.idProducto}"
                            th:text="${p.nombre} + ' (stock: ' + ${p.stock} + ')'"></option>
                </select>
            </div>
            <div class="campo">
                <label for="cantidad">Cantidad</label>
                <input type="number" id="cantidad" name="cantidad" min="1" step="1" required>
            </div>
            <button type="submit" class="boton boton-primario">Agregar a la venta</button>
        </form>

    </main>

    <footer th:replace="~{fragmentos :: pie}"></footer>

</body>
</html>
