<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fercementos | Ventas</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

    <header th:replace="~{fragmentos :: cabeceraApp}"></header>

    <main class="contenedor">

        <div class="barra-acciones">
            <h2 class="titulo-formulario">Ventas</h2>
            <a class="boton boton-primario" th:href="@{/ventas/nueva}">+ Nueva venta</a>
        </div>

        <p class="mensaje-vacio" th:if="${#lists.isEmpty(ventas)}">
            Aún no hay ventas registradas.</p>

        <table class="tabla" th:unless="${#lists.isEmpty(ventas)}">
            <thead>
                <tr><th>ID</th><th>Fecha</th><th>Cliente</th><th>Líneas</th><th>Total</th><th>Acciones</th></tr>
            </thead>
            <tbody>
                <tr th:each="v : ${ventas}">
                    <td th:text="${v.idVenta}"></td>
                    <td th:text="${v.fecha}"></td>
                    <td th:text="${v.cliente?.nombre} ?: '—'"></td>
                    <td th:text="${#lists.size(v.detalles)}"></td>
                    <!-- getTotal() es un metodo @Transient calculado sobre los detalles -->
                    <td th:text="${#numbers.formatDecimal(v.total, 1, 'POINT', 2, 'COMMA')}"></td>
                    <td class="celda-acciones">
                        <a class="enlace-editar" th:href="@{/ventas/detalle/{id}(id=${v.idVenta})}">Ver detalle</a>
                        <a class="enlace-eliminar" th:href="@{/ventas/eliminar/{id}(id=${v.idVenta})}"
                           onclick="return confirm('¿Eliminar esta venta? El stock de sus productos será devuelto.');">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>

    </main>

    <footer th:replace="~{fragmentos :: pie}"></footer>

</body>
</html>
