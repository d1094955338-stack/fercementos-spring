# =====================================================================
# Fercementos Spring - configuracion de la aplicacion
# =====================================================================

spring.application.name=fercementos-spring

# --- Conexion a la base de datos "ferreteria" (misma BD del proyecto) ---
spring.datasource.url=jdbc:mysql://localhost:3306/ferreteria?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=9604

# --- JPA / Hibernate ---
# "none": Hibernate NO modifica el esquema; se respeta el script SQL
# oficial del proyecto (Evidencia GA6-220501096-AA2-EV03).
spring.jpa.hibernate.ddl-auto=none
# Mostrar el SQL generado en consola (util para sustentar la evidencia)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Thymeleaf ---
# Sin cache en desarrollo para ver los cambios de las vistas al instante
spring.thymeleaf.cache=false

# --- Servidor ---
server.port=8080
